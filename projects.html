<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Projects — Alejandro Arab</title>
    <link rel="stylesheet" href="tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: none;
      cursor: crosshair;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── CURSOR ── */
    .cursor {
      width: 8px; height: 8px;
      background: var(--amber);
      position: fixed; pointer-events: none;
      z-index: 9999; transition: transform 0.08s;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 15px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text);
      transition: color 0.15s;
    }
    .nav-logo:hover { color: var(--amber); }

    .nav-right { display: flex; align-items: center; gap: 22px; }

    .hamburger {
      display: none;
      flex-direction: column; gap: 5px;
      background: none; border: none;
      cursor: pointer; padding: 4px;
    }

    .hamburger span {
      display: block; width: 18px; height: 1px;
      background: var(--text); transition: transform 0.2s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { transform: rotate(-45deg); }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      nav { left: 0; }
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 140px 48px 66px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-eyebrow {
      font-size: 13px;
      color: var(--amber);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .page-eyebrow::before { content: '( '; color: var(--muted); }
    .page-eyebrow::after  { content: ' )'; color: var(--muted); }

    .page-title {
      font-size: clamp(48px, 8vw, 110px);
      line-height: 0.88;
      letter-spacing: -0.03em;
      font-weight: normal;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 33px;
    }

    .page-subtitle {
      font-size: 17px;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 1.7;
    }

    /* ── PROJECTS GRID ── */
    .projects-grid-wrap {
      padding: 0 48px 88px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
      border: none;
    }

    /* ── PROJECT CARD ── */
    .project-card {
      display: flex;
      flex-direction: column;
      transition: background 0.18s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .project-card:hover {
      background: var(--bg-panel);
    }

    .project-card:hover .card-cover img {
      filter: grayscale(0%);
      transform: scale(1.02);
    }

    .project-card:hover .card-arrow {
      color: var(--amber);
    }

    /* Cover thumbnail */
    .card-cover {
      width: 100%;
      overflow: hidden;
      background: transparent;
      position: relative;
      flex-shrink: 0;
    }

    .card-cover img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      filter: grayscale(15%);
      transition: filter 0.4s, transform 0.4s;
    }

    /* Scanlines overlay */
    .card-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.012) 3px, rgba(0,0,0,0.012) 4px
      );
      pointer-events: none;
    }

    /* No-cover placeholder */
    .card-cover-placeholder {
      width: 100%;
      aspect-ratio: 16 / 8;
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-cover-placeholder-inner {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.4;
    }

    /* Card body */
    .card-body {
      padding: 28px 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-num {
      font-size: 13px;
      color: var(--amber);
      letter-spacing: 0.16em;
      flex-shrink: 0;
      padding-top: 3px;
    }

    .card-tag {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 3px 9px;
      flex-shrink: 0;
    }

    .card-tag.highlight {
      border-color: var(--amber-border);
      color: var(--amber);
    }

    .card-title {
      font-size: clamp(22px, 2.6vw, 33px);
      line-height: 0.95;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: normal;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .card-meta-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .card-meta-key {
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      min-width: 70px;
      flex-shrink: 0;
    }

    .card-meta-val {
      color: var(--muted);
    }

    .card-meta-val.status-completed { color: var(--text); }
    .card-meta-val.status-progress   { color: var(--amber); }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 28px 22px;
    }

    .card-arrow {
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.15s;
    }

    /* ── PIXEL CAT — theme aware ── */
    .cat-body       { fill: var(--text); }
    .cat-ear-inner  { fill: var(--bg); }
    .cat-eye        { fill: var(--bg); }
    .cat-nose       { fill: var(--amber); }
    .cat-collar     { fill: var(--amber); opacity: 0.7; }
    .cat-collar-dot { fill: var(--bg); }

    /* ── FOOTER ── */
    .footer-logo-bar {
      border-top: 1px solid var(--border);
      padding: 22px 48px;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .footer-logotype {
      font-size: clamp(33px, 7vw, 88px);
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
      text-transform: uppercase;
    }

    .footer-reg {
      font-size: 29px;
      color: var(--muted);
    }

    .footer-bar {
      border-top: 1px solid var(--border);
      padding: 14px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .footer-links a {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: var(--amber); }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      .projects-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .page-header { padding: 110px 20px 48px; }
      .projects-grid-wrap { padding: 0 0 66px; }
      .card-body { padding: 22px 20px 16px; }
      .card-footer { padding: 0 20px 18px; }
      .footer-logo-bar { padding: 16px 20px; }
      .footer-bar { padding: 14px 20px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
<script src="sidebar.js"></script>

<div class="cursor" id="cursor"></div>

<nav>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span>
  </button>
  <a class="nav-logo" href="index.html">Alejandro Arab</a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-eyebrow">All Projects</div>
  <h1 class="page-title">Work</h1>
  <p class="page-subtitle">10 projects — product design, brand identity &amp; UX across web, mobile, and AI.</p>
</div>

<!-- PROJECTS GRID -->
<div class="projects-grid-wrap">
  <div class="projects-grid" id="projects-grid">
    <!-- rendered by JS -->
  </div>
</div>

<!-- FOOTER -->
<div class="footer-logo-bar">
  <span class="footer-logotype">Alejandro Arab</span>
  <span class="footer-reg">®</span>
</div>
<div class="footer-bar">
  <span class="footer-copy">© 2026 — Alejandro Arab. All rights reserved.</span>
  <ul class="footer-links">
    <li><a href="https://www.linkedin.com/in/arabalejandro/" target="_blank">LinkedIn</a></li>
    <li><a href="https://www.instagram.com/arabalejandro/" target="_blank">Instagram</a></li>
  </ul>
</div>

<script src="projects.js"></script>
<script src="transition.js"></script>
<script>
  // ── CURSOR ──
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = (e.clientX - 4) + 'px';
    cursor.style.top  = (e.clientY - 4) + 'px';
  });
  document.addEventListener('mousedown', () => cursor.style.transform = 'scale(2.5)');
  document.addEventListener('mouseup',   () => cursor.style.transform = 'scale(1)');

  // ── RENDER PROJECTS ──
  const grid = document.getElementById('projects-grid');

  PROJECTS.filter(p => !p.hidden).forEach(p => {
    const statusClass = p.status === 'In Progress' ? 'status-progress' : 'status-completed';
    const coverSrc = p.thumb || p.cover;

    const coverHTML = coverSrc
      ? `<div class="card-cover">
           <img src="${coverSrc}" alt="${p.title}" loading="lazy" />
         </div>`
      : `<div class="card-cover-placeholder">
           <span class="card-cover-placeholder-inner">No preview</span>
         </div>`;

    const card = document.createElement('a');
    card.className = 'project-card reveal';
    card.href = 'works/' + p.id + '.html';

    card.innerHTML = `
      ${coverHTML}
      <div class="card-body">
        <div class="card-top">
          <span class="card-num">[ ${p.num} ]</span>
        </div>
        <div class="card-title">${p.title}</div>
        <div class="card-subtitle">${p.subtitle}</div>
        <div class="card-meta-val">${p.category}</div>
      </div>
      <div class="card-footer">
        <span class="card-arrow">View project →</span>
      </div>
    `;

    grid.appendChild(card);
  });
  if (window.setupReveal) window.setupReveal();
</script>
</body>
</html>
