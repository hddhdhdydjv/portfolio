<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../assets/favicons/light.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" href="../assets/favicons/dark.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" href="../assets/favicons/dark.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Alejandro Arab</title>
    <link rel="stylesheet" href="../tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: none;
      cursor: crosshair;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; width: 100%; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── CURSOR ── */
    .cursor {
      width: 8px; height: 8px;
      background: var(--amber);
      position: fixed; pointer-events: none;
      z-index: 9999; transition: transform 0.08s;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Hamburger LEFT on mobile — must be first in flex order */
    .hamburger {
      display: none;
      order: -1;
      flex-direction: column; gap: 5px;
      background: none; border: none;
      cursor: pointer; padding: 4px;
      margin-right: 14px;
    }

    .hamburger span {
      display: block; width: 18px; height: 1px;
      background: var(--text); transition: transform 0.2s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { transform: rotate(-45deg); }

    .nav-logo {
      font-size: 15px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text);
      transition: color 0.15s;
    }
    .nav-logo:hover { color: var(--amber); }

    .nav-back {
      font-size: 15px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--amber); }

    @media (max-width: 1024px) {
      .hamburger { display: flex; }
      .nav-back { display: none; }
      nav { left: 0; padding: 18px 22px; justify-content: flex-start; gap: 11px; }
    }

    /* ── HERO ── */
    .project-hero {
      padding: 120px 48px 48px;
    }

    .project-eyebrow {
      font-size: 13px;
      color: var(--amber);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .project-title {
      font-size: clamp(55px, 10vw, 132px);
      line-height: 0.85;
      letter-spacing: -0.03em;
      font-weight: normal;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 48px;
    }

    /* ── META ROW ── */
    .meta-row {
      display: flex;
    }

    .meta-cell {
      flex: 1;
      padding: 14px 16px 14px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meta-key {
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .meta-val {
      font-size: 15px;
      color: var(--text);
      letter-spacing: 0.04em;
      font-family: var(--font-body);
    }

    /* ── IMAGE FRAME (cover + imageAfter) ── */
    .img-frame {
      background: var(--paper);
      position: relative;
      margin-left: 24px;
      margin-right: 24px;
    }

    .img-frame img {
      width: 100%;
      display: block;
      border-radius: 2px;
    }

    /* ── COVER IMAGE — 24px side margins ── */
    .cover-img { padding: 0; margin-left: 24px; margin-right: 24px; } .cover-img img { width: 100%; display: block; border-radius: 4px; }

    /* ── EDITORIAL SECTIONS ── */
    .editorial-group {}

    .editorial-single {
      padding: 66px 48px;
    }

    .editorial-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .editorial-col {
      padding: 66px 48px;
    }

    .editorial-col + .editorial-col {}

    .editorial-label {
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 48px;
      line-height: 1;
    }

    .editorial-label .paren { color: var(--muted); }
    .editorial-label .lbl  { color: var(--amber); }

    .editorial-text-intro {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.9;
      letter-spacing: 0.02em;
      font-family: var(--font-body);
    }

    .editorial-text {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.9;
      letter-spacing: 0.03em;
      font-family: var(--font-body);
    }

    /* ── DELIVERABLES ── */
    .deliverables {
      border-top: 1px solid var(--border);
      padding: 48px;
    }

    .del-label {
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .del-label .paren { color: var(--muted); }
    .del-label .lbl  { color: var(--amber); }

    .del-list {
      display: flex;
      flex-wrap: wrap;
      gap: 11px;
    }

    .del-tag {
      font-size: 15px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .del-tag::before {
      content: '◈';
      color: var(--amber);
      font-size: 12px;
    }

    /* ── PREV / NEXT ── */
    .proj-nav {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .proj-nav-item {
      padding: 48px;
      display: flex; flex-direction: column; gap: 11px;
      transition: background 0.15s;
      cursor: pointer;
    }

    .proj-nav-item:first-child { border-right: 1px solid var(--border); }
    .proj-nav-item:hover { background: var(--bg-panel); }
    .proj-nav-item.disabled { opacity: 0.2; pointer-events: none; }

    .proj-nav-label {
      font-size: 13px; color: var(--amber);
      letter-spacing: 0.14em; text-transform: uppercase;
    }

    .proj-nav-title {
      font-size: clamp(29px, 4vw, 48px);
      letter-spacing: -0.02em; line-height: 0.95;
      text-transform: uppercase; color: var(--text);
      font-weight: normal;
      transition: color 0.15s;
    }

    .proj-nav-item:hover .proj-nav-title { color: var(--amber); }

    .proj-nav-meta { font-size: 15px; color: var(--muted); }

    /* ── FOOTER ── */
    .footer-logo-bar {
      border-top: 1px solid var(--border);
      padding: 22px 48px;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .footer-logotype {
      font-size: clamp(33px, 7vw, 88px);
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
      text-transform: uppercase;
    }

    .footer-bar {
      border-top: 1px solid var(--border);
      padding: 14px 48px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .footer-links a {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: var(--amber); }

    .footer-back {
      font-size: 15px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: color 0.15s;
    }

    .footer-back:hover { color: var(--amber); }

    /* ── NOTEBOOK PAPER — always light, regardless of theme ── */
    .notebook-paper {
      position: relative;
      background: var(--paper);
      margin: 99px 0 66px 22px;
      color: var(--paper-text);
      overflow: visible;
    }

    html[data-theme="light"] .notebook-paper {
      border: 1px solid var(--border);
    }

    html[data-theme="dark"] .notebook-paper {
      border: 1px solid var(--border);
    }

    .notebook-paper .project-title,
    .notebook-paper .meta-val,
    .notebook-paper .editorial-text-intro,
    .notebook-paper .editorial-text,
    .notebook-paper .del-tag {
      color: var(--muted);
    }

    .notebook-paper .project-eyebrow,
    .notebook-paper .meta-key,
    .notebook-paper .editorial-label .paren,
    .notebook-paper .del-label .paren {
      color: var(--amber);
    }

    .notebook-paper .editorial-label .lbl,
    .notebook-paper .del-label .lbl,
    .notebook-paper .project-subtitle {
      color: var(--amber);
    }

    .notebook-paper .meta-row {
      border-color: var(--border);
    }

    .notebook-paper .del-tag {
      border-color: var(--border);
    }

    .notebook-inner {
      padding-left: 66px;
      padding-right: 0;
    }

    .notebook-inner .project-hero     { padding-left: 48px; padding-right: 48px; padding-top: 208px; position: relative; }
    .notebook-inner .editorial-single { padding-left: 48px; padding-right: 48px; }
    .notebook-inner .editorial-col    { padding-left: 48px; padding-right: 48px; }
    .notebook-inner .deliverables     { padding-left: 48px; padding-right: 48px; }

    .notebook-col {
      position: absolute;
      top: 0;
      width: 66px;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      transition: none !important;
      background-size: 66px 110px;
      background-repeat: repeat-y;
    }

    html[data-theme="light"] .notebook-col {
      background-color: var(--paper);
      background-image: radial-gradient(circle at 33px 55px, var(--bg) 10.5px, var(--border) 10.5px, var(--border) 11.5px, transparent 11.5px);
    }

    html[data-theme="dark"] .notebook-col {
      background-color: var(--paper);
      background-image: radial-gradient(circle at 33px 55px, var(--bg) 10.5px, var(--border) 10.5px, var(--border) 11.5px, transparent 11.5px);
    }

    .notebook-col--left  { left: 0; border-right: 1px solid var(--border); }
    .notebook-col--right { right: 0; border-left: 1px solid var(--border); }

    @media (max-width: 1024px) {
      .notebook-paper {
        transition: margin-left 0.35s cubic-bezier(0.16,1,0.3,1);
      }
      body.sidebar-push .notebook-paper { margin-left: 24px; }
      .notebook-inner { padding-left: 66px; padding-right: 0; }
      .notebook-inner .project-hero { padding-top: 184px; padding-left: 16px; padding-right: 16px; }
      .notebook-inner .editorial-single { padding-left: 16px; padding-right: 16px; }
      .notebook-inner .editorial-col { padding-left: 16px; padding-right: 16px; }
      .notebook-inner .deliverables { padding-left: 16px; padding-right: 16px; }
      .editorial-two-col { grid-template-columns: 1fr; }
      .editorial-col--empty { display: none; }
    }

    /* ── TABLET: hoja pegada al borde der, col izq visible, col der oculta ── */
    @media (min-width: 769px) and (max-width: 1024px) {
      .notebook-paper { margin: 88px 0 0 24px; }
      .notebook-col--right { display: none; }
      .proj-nav { margin-top: 64px; }
    }

    /* ── NOT FOUND ── */
    .not-found {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px; text-align: center;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .notebook-paper { margin: 88px 0 0 -33px; }
      .notebook-col--right { display: none; }
      .meta-row { flex-wrap: wrap; }
      .meta-cell { flex: 1 1 45%; }
      .proj-nav { grid-template-columns: 1fr; }
      .proj-nav-item { padding: 28px 16px; }
      .proj-nav-item:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      .page-footer { padding: 14px 16px; flex-direction: column; gap: 8px; }
      .img-frame { margin-left: 16px; margin-right: 16px; }
      .cover-img { margin-left: 16px; margin-right: 16px; }
      .project-title { font-size: clamp(32px, 9vw, 44px); }
      .editorial-single, .editorial-col { padding: 40px 22px; }
      .editorial-text-intro, .editorial-text { font-size: 15px; line-height: 1.75; }
      .meta-val { font-size: 14px; }
      .meta-key, .editorial-label, .del-label, .project-eyebrow, .proj-nav-label { font-size: 11px; letter-spacing: 0.14em; }
      .proj-nav-title { font-size: 24px; }
      .del-tag { font-size: 13px; padding: 5px 11px; }
      .project-hero { padding: 100px 22px 40px; }
    }
  </style>
</head>
<body>
<script src="../sidebar.js"></script>

<div class="cursor" id="cursor"></div>

<nav>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span>
  </button>
  <a class="nav-logo" href="../index.html">Alejandro Arab</a>
</nav>

<div id="page-content"></div>

<!-- FOOTER -->
<div class="footer-logo-bar">
  <span class="footer-logotype">Alejandro Arab</span>
</div>
<div class="footer-bar">
  <ul class="footer-links">
    <li><a href="mailto:alejandro@arab.design">Email</a></li>
    <li><a href="https://www.linkedin.com/in/arabalejandro/" target="_blank">LinkedIn</a></li>
    <li><a href="https://www.instagram.com/arabalejandro/" target="_blank">Instagram</a></li>
  </ul>
</div>

<script src="../projects.js"></script>
<script src="../transition.js"></script>
<script>
  // ── CURSOR ──
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = (e.clientX - 4) + 'px';
    cursor.style.top  = (e.clientY - 4) + 'px';
  });
  document.addEventListener('mousedown', () => cursor.style.transform = 'scale(2.5)');
  document.addEventListener('mouseup',   () => cursor.style.transform = 'scale(1)');

  // ── HELPERS ──
  function labelHTML(label) {
    return `<div class="editorial-label"><span class="paren">( </span><span class="lbl">${label}</span><span class="paren"> )</span></div>`;
  }

  function imgFrameHTML(src, alt) {
    return `<div class="img-frame"><img src="${src}" alt="${alt}" loading="lazy" /></div>`;
  }

  // ── GROUP SECTIONS ──
  // Each labeled section alternates left/right column; unlabeled sections are intro.
  function groupSections(sections) {
    const groups = [];
    let colIdx = 0;
    for (let i = 0; i < sections.length; i++) {
      const sec = sections[i];
      if (!sec.label) {
        groups.push({ type: 'intro', section: sec });
      } else {
        const side = (colIdx % 2 === 0) ? 'left' : 'right';
        groups.push({ type: 'half', side, section: sec });
        colIdx++;
      }
    }
    return groups;
  }

  // ── TRANSLATION HELPER ──
  function _t(en, es) {
    const lang = localStorage.getItem('aa-lang') || 'en';
    return lang === 'es' && es != null ? es : en;
  }

  // ── LOAD PROJECT ──
  const path     = window.location.pathname;
  const fileName = path.split('/').pop().replace('.html', '');
  const project  = PROJECTS.find(p => p.id === fileName);
  const content  = document.getElementById('page-content');

  function renderContent() {
  if (!project) {
    content.innerHTML = `
      <div class="not-found">
        <div style="font-size:59px;text-transform:uppercase;color:var(--text)">404</div>
        <div style="font-size:15px;color:var(--muted)">${_t('Project not found.', 'Proyecto no encontrado.')}</div>
        <a href="../index.html" style="color:var(--amber);font-size:15px;letter-spacing:0.1em;text-transform:uppercase;margin-top:11px;">${_t('← Back to portfolio', '← Volver al portfolio')}</a>
      </div>`;
  } else {
    document.title = project.title + ' — Alejandro Arab';

    const prevP = project.prev ? PROJECTS.find(p => p.id === project.prev) : null;
    const nextP = project.next ? PROJECTS.find(p => p.id === project.next) : null;

    // ── BUILD EDITORIAL HTML ──
    const groups = groupSections(project.sections);
    let editorialHTML = '';

    groups.forEach(group => {
      if (group.type === 'intro') {
        const sec = group.section;
        editorialHTML += `
          <div class="editorial-group reveal">
            <div class="editorial-two-col">
              <div class="editorial-col editorial-col--empty"></div>
              <div class="editorial-col"><p class="editorial-text-intro">${_t(sec.text, sec.textEs)}</p></div>
            </div>
          </div>`;
        if (sec.imageAfter) {
          editorialHTML += imgFrameHTML(sec.imageAfter, project.title);
        }
      } else if (group.type === 'single') {
        const sec = group.section;
        editorialHTML += `
          <div class="editorial-group reveal">
            <div class="editorial-single">
              ${labelHTML(_t(sec.label, sec.labelEs))}
              <p class="editorial-text">${_t(sec.text, sec.textEs)}</p>
            </div>
          </div>`;
        if (sec.imageAfter) {
          editorialHTML += imgFrameHTML(sec.imageAfter, project.title);
        }
      } else if (group.type === 'half') {
        const sec  = group.section;
        const isLeft = group.side === 'left';
        const filledCol = `<div class="editorial-col">${labelHTML(_t(sec.label, sec.labelEs))}<p class="editorial-text">${_t(sec.text, sec.textEs)}</p></div>`;
        const emptyCol  = `<div class="editorial-col editorial-col--empty"></div>`;
        editorialHTML += `
          <div class="editorial-group reveal">
            <div class="editorial-two-col">${isLeft ? filledCol + emptyCol : emptyCol + filledCol}</div>
          </div>`;
        if (sec.imageAfter) {
          editorialHTML += imgFrameHTML(sec.imageAfter, project.title);
        }
      }
    });

    // ── DELIVERABLES ──
    const delList = _t(project.deliverables, project.deliverablesEs) || project.deliverables;
    const delTags = delList
      .map(d => `<div class="del-tag">${d}</div>`)
      .join('');

    // ── COVER IMAGE ──
    const coverHTML = project.cover
      ? `<div class="cover-img"><img src="${project.cover}" alt="${project.title}" loading="lazy" /></div>`
      : '';

    content.innerHTML = `

      <!-- NOTEBOOK PAPER — wraps project content only -->
      <div class="notebook-paper">
        <div class="notebook-col notebook-col--left"></div>
        <div class="notebook-inner">

          <!-- HERO -->
          <div class="project-hero">
            <div class="project-eyebrow reveal">[ ${project.num} / ${String(PROJECTS.filter(p => !p.hidden).length).padStart(2, '0')} ]</div>
            <h1 class="project-title reveal" style="--reveal-delay:60ms">${project.title}</h1>
            <div class="meta-row">
              <div class="meta-cell reveal" style="--reveal-delay:120ms">
                <span class="meta-key" data-i18n="meta.client">Client</span>
                <span class="meta-val">${project.client}</span>
              </div>
              <div class="meta-cell reveal" style="--reveal-delay:160ms">
                <span class="meta-key" data-i18n="meta.category">Category</span>
                <span class="meta-val">${_t(project.category, project.categoryEs)}</span>
              </div>
              <div class="meta-cell reveal" style="--reveal-delay:200ms">
                <span class="meta-key" data-i18n="meta.duration">Duration</span>
                <span class="meta-val">${_t(project.duration, project.durationEs)}</span>
              </div>
              <div class="meta-cell reveal" style="--reveal-delay:240ms">
                <span class="meta-key" data-i18n="meta.role">Role</span>
                <span class="meta-val">${_t(project.role, project.roleEs)}</span>
              </div>
            </div>
          </div>

          <!-- COVER IMAGE — full bleed -->
          ${coverHTML}

          <!-- EDITORIAL SECTIONS -->
          ${editorialHTML}

          <!-- bottom margin -->
          <div style="height: 66px;"></div>

        </div><!-- /notebook-inner -->
      </div><!-- /notebook-paper -->

      <!-- PREV / NEXT -->
      <div class="proj-nav">
        <a class="proj-nav-item reveal ${!prevP ? 'disabled' : ''}" href="${prevP ? prevP.id + '.html' : '#'}" style="--reveal-delay:0ms">
          <span class="proj-nav-label" data-i18n="nav.prev">← Previous</span>
          <span class="proj-nav-title">${prevP ? prevP.title : '—'}</span>
          <span class="proj-nav-meta">${prevP ? _t(prevP.category, prevP.categoryEs) : ''}</span>
        </a>
        <a class="proj-nav-item reveal ${!nextP ? 'disabled' : ''}" href="${nextP ? nextP.id + '.html' : '#'}" style="--reveal-delay:80ms;text-align:right">
          <span class="proj-nav-label" data-i18n="nav.next">Next →</span>
          <span class="proj-nav-title">${nextP ? nextP.title : '—'}</span>
          <span class="proj-nav-meta">${nextP ? _t(nextP.category, nextP.categoryEs) : ''}</span>
        </a>
      </div>

    `;
  }
  }

  function renderAndReveal() {
    renderContent();
    if (window.setupReveal) window.setupReveal();
    if (window.applyThemeImages) window.applyThemeImages();
  }
  renderAndReveal();
  window.addEventListener('aa:langchange', renderAndReveal);
</script>
</body>
</html>
